<!DOCTYPE html>
<html>
<head>
  <title>Smart Room Dashboard</title>

  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #f4f6f9;
      transition: 0.3s;
    }

    .dark { background: #121212; color: white; }

    .topbar {
      display:flex;
      justify-content:space-between;
      padding:12px;
      background:white;
      position:sticky;
      top:0;
    }

    .menu-btn {
      font-size:22px;
      background:none;
      border:none;
    }

    .side-menu {
      position:fixed;
      right:-250px;
      top:0;
      width:220px;
      height:100%;
      background:#222;
      color:white;
      padding:20px;
      transition:0.3s;
    }

    .container {
      max-width:900px;
      margin:auto;
      padding:20px;
      text-align:center;
    }

    table {
      width:100%;
      border-collapse:collapse;
    }

    th, td {
      border:1px solid #ccc;
      padding:8px;
    }

    th {
      background:#333;
      color:white;
    }
  </style>
</head>

<body>

<div class="topbar">
  <h3>Smart Room</h3>
  <button class="menu-btn" onclick="toggleMenu()">☰</button>
</div>

<div id="menu" class="side-menu">
  <button onclick="setPage('live')">Live</button>
  <button onclick="setPage('history')">History</button>
  <button onclick="toggleDark()">Dark</button>
</div>

<div class="container">

  <!-- LIVE -->
  <div id="live">
    <h2>Live Data</h2>
    <h3 id="temp">--</h3>
    <h3 id="hum">--</h3>
    <h3 id="status">--</h3>
  </div>

  <!-- HISTORY -->
  <div id="history" style="display:none;">
    <h2>History</h2>
    <div id="table"></div>
  </div>

</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<script src="script.js"></script>

</body>
</html>
