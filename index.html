<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Smart Room Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;600&display=swap" rel="stylesheet"/>

  <style>
    :root {
      --bg: #f0f2f5;
      --surface: #ffffff;
      --surface2: #f8f9fb;
      --text: #111;
      --text2: #555;
      --border: #e0e0e0;
      --accent: #2563eb;
      --red: #ef4444;
      --green: #22c55e;
      --blue: #3b82f6;
      --orange: #f97316;
    }

    .dark {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #22263a;
      --text: #e8eaf6;
      --text2: #8892b0;
      --border: #2a2d3e;
      --accent: #60a5fa;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      transition: background 0.4s, color 0.4s;
      min-height: 100vh;
    }

    /* ─── TOPBAR ─── */
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 24px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 50;
    }
    .topbar h1 {
      font-family: 'Space Mono', monospace;
      font-size: 1rem;
      letter-spacing: 0.05em;
      color: var(--text);
    }
    .topbar-right { display: flex; align-items: center; gap: 12px; }
    .conn-badge {
      font-size: 0.72rem;
      font-weight: 600;
      padding: 4px 10px;
      border-radius: 20px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      background: #fef2f2;
      color: var(--red);
      border: 1px solid #fca5a5;
      transition: all 0.4s;
    }
    .conn-badge.online {
      background: #f0fdf4;
      color: var(--green);
      border-color: #86efac;
    }
    .menu-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 8px;
      width: 36px;
      height: 36px;
      font-size: 18px;
      cursor: pointer;
      color: var(--text);
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s;
    }
    .menu-btn:hover { background: var(--surface2); }

    /* ─── SIDE MENU ─── */
    .overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.4);
      z-index: 90;
    }
    .overlay.open { display: block; }
    .side-menu {
      position: fixed;
      top: 0; right: -280px;
      width: 260px; height: 100%;
      background: var(--surface);
      border-left: 1px solid var(--border);
      padding: 24px 16px;
      transition: right 0.3s cubic-bezier(.4,0,.2,1);
      z-index: 100;
    }
    .side-menu.open { right: 0; }
    .side-menu h3 {
      font-family: 'Space Mono', monospace;
      font-size: 0.9rem;
      color: var(--text2);
      margin-bottom: 16px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }
    .menu-item {
      display: block;
      width: 100%;
      text-align: left;
      padding: 12px 14px;
      margin-bottom: 6px;
      background: none;
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
    }
    .menu-item:hover { background: var(--surface2); border-color: var(--accent); }
    .menu-item.active { background: var(--accent); color: white; border-color: var(--accent); }

    /* ─── MAIN CONTAINER ─── */
    .container {
      max-width: 960px;
      margin: 0 auto;
      padding: 28px 20px;
    }

    .section-title {
      font-family: 'Space Mono', monospace;
      font-size: 1.1rem;
      margin-bottom: 20px;
      color: var(--text);
    }

    /* ─── CARDS ─── */
    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-bottom: 20px;
    }
    @media(max-width:600px){ .grid { grid-template-columns: 1fr; } }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px 20px;
      text-align: center;
      transition: background 0.3s, border 0.3s;
    }
    .card-label {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text2);
      margin-bottom: 10px;
    }
    .card-value {
      font-family: 'Space Mono', monospace;
      font-size: 2rem;
      font-weight: 700;
      color: var(--text);
      word-break: break-all;
    }

    /* ─── ALERT BOX ─── */
    .alert-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 20px;
      font-weight: 600;
      font-size: 0.95rem;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
      transition: all 0.4s;
    }
    .alert-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: var(--green);
      flex-shrink: 0;
    }

    /* ─── CHART ─── */
    .chart-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px;
    }

    /* ─── HISTORY ─── */
    #history { display: none; }

    .search-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 18px;
      align-items: center;
    }
    .search-bar input {
      padding: 8px 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
    }
    .search-bar button {
      padding: 8px 16px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.9rem;
      font-family: 'DM Sans', sans-serif;
    }
    .btn-primary { background: var(--accent); color: white; }
    .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }

    .history-table-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
    }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 12px 16px; text-align: center; font-size: 0.9rem; }
    th {
      background: var(--surface2);
      font-family: 'Space Mono', monospace;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text2);
      border-bottom: 1px solid var(--border);
    }
    tr:not(:last-child) td { border-bottom: 1px solid var(--border); }
    tr:hover td { background: var(--surface2); }

    .empty-msg {
      text-align: center;
      padding: 40px;
      color: var(--text2);
      font-size: 0.9rem;
    }
  </style>
</head>
<body>

<!-- OVERLAY -->
<div class="overlay" id="overlay" onclick="closeMenu()"></div>

<!-- SIDE MENU -->
<div class="side-menu" id="menu">
  <h3>Navigation</h3>
  <button class="menu-item active" id="btn-live" onclick="showLive()">📡 Live Data</button>
  <button class="menu-item" id="btn-temp" onclick="showTemp()">🌡 Temp History</button>
  <button class="menu-item" id="btn-hum" onclick="showHum()">💧 Humidity History</button>
  <br/>
  <button class="menu-item" onclick="toggleDark()">🌙 Toggle Dark Mode</button>
</div>

<!-- TOP BAR -->
<div class="topbar">
  <h1>🏠 Smart Room</h1>
  <div class="topbar-right">
    <div class="conn-badge" id="connBadge">● OFFLINE</div>
    <button class="menu-btn" onclick="toggleMenu()">☰</button>
  </div>
</div>

<!-- CONTAINER -->
<div class="container">

  <!-- LIVE -->
  <div id="live">
    <div class="section-title">Live Data</div>

    <div class="grid">
      <div class="card">
        <div class="card-label">Temperature</div>
        <div class="card-value" id="temp">--</div>
      </div>
      <div class="card">
        <div class="card-label">Humidity</div>
        <div class="card-value" id="hum">--</div>
      </div>
      <div class="card">
        <div class="card-label">Sensor Status</div>
        <div class="card-value" id="sensorStatus" style="font-size:1rem;">Waiting...</div>
      </div>
    </div>

    <div class="alert-box" id="alertBox">
      <div class="alert-dot" id="alertDot"></div>
      <span id="alertText">System Normal</span>
    </div>

    <div class="alert-box" id="humAlertBox">
      <div class="alert-dot" id="humAlertDot"></div>
      <span id="humAlertText">Humidity Normal</span>
    </div>

    <div class="chart-wrap">
      <canvas id="chart" height="120"></canvas>
    </div>
  </div>

  <!-- HISTORY -->
  <div id="history">
    <div class="section-title" id="historyTitle">History</div>

    <div class="search-bar">
      <input type="date" id="searchDate"/>
      <input type="time" id="searchTime"/>
      <button class="btn-primary" onclick="filterHistory()">Search</button>
      <button class="btn-secondary" onclick="resetHistory()">Reset</button>
    </div>

    <div class="history-table-wrap" id="list"></div>
  </div>

</div>

<!-- FIREBASE & CHART -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="script.js"></script>

</body>
</html>
