<!DOCTYPE html>
<html>
<head>
  <title>Smart Room Dashboard</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f4f6f9;
      transition: 0.3s;
    }

    .dark {
      background: #121212;
      color: white;
    }

    /* TOP BAR */
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 15px;
      background: white;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .dark .topbar {
      background: #1e1e1e;
    }

    .menu-btn {
      font-size: 24px;
      background: none;
      border: none;
      cursor: pointer;
    }

    /* SIDE MENU */
    .side-menu {
      position: fixed;
      top: 0;
      right: -260px;
      width: 240px;
      height: 100%;
      background: #222;
      color: white;
      padding: 20px;
      transition: 0.3s ease;
      z-index: 999;
    }

    .side-menu button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      cursor: pointer;
      border: none;
      border-radius: 6px;
    }

    /* MAIN */
    .container {
      max-width: 900px;
      margin: auto;
      padding: 20px;
      text-align: center;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 15px;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    .dark .card {
      background: #1e1e1e;
    }

    .value {
      font-size: 28px;
      font-weight: bold;
    }

    .status-box {
      margin-top: 15px;
      padding: 12px;
      border-radius: 10px;
      font-weight: bold;
    }

    canvas {
      margin-top: 20px;
      background: white;
      border-radius: 10px;
      padding: 10px;
    }

    .dark canvas {
      background: #1e1e1e;
    }

    /* TABLE STYLE */
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 15px;
    }

    th, td {
      border: 1px solid #ccc;
      padding: 10px;
      text-align: center;
    }

    th {
      background: #333;
      color: white;
    }

    .dark th {
      background: #444;
    }
  </style>
</head>

<body>

<!-- TOP BAR -->
<div class="topbar">
  <h3>🏠 Smart Room Dashboard</h3>
  <button class="menu-btn" onclick="toggleMenu()">☰</button>
</div>

<!-- SIDE MENU -->
<div id="menu" class="side-menu">
  <h3>📂 Menu</h3>
  <button onclick="showLive()">Live Data</button>
  <button onclick="showTemp()">Temperature History</button>
  <button onclick="showHum()">Humidity History</button>
  <button onclick="toggleDark()">Dark Mode</button>
</div>

<!-- MAIN -->
<div class="container">

  <!-- LIVE -->
  <div id="live">
    <h2>Live Data</h2>

    <div class="grid">
      <div class="card">
        <h3>Temperature</h3>
        <div class="value" id="temp">--</div>
      </div>

      <div class="card">
        <h3>Humidity</h3>
        <div class="value" id="hum">--</div>
      </div>

      <div class="card">
        <h3>Status</h3>
        <div class="value" id="status">--</div>
      </div>
    </div>

    <div id="alert" class="status-box">System Normal</div>

    <canvas id="chart"></canvas>
  </div>

  <!-- HISTORY -->
  <div id="history" style="display:none;">
    <h2 id="title">History</h2>
    <div id="list"></div>
  </div>

</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<!-- CHART -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script src="script.js"></script>

</body>
</html>
