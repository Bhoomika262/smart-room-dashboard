<!DOCTYPE html>
<html>
<head>
  <title>Smart Room Dashboard</title>

  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #f4f6f9;
    }

    .dark { background: #121212; color: white; }

    .topbar {
      display: flex;
      justify-content: space-between;
      padding: 12px;
      background: white;
      position: sticky;
      top: 0;
    }

    .menu-btn {
      font-size: 24px;
      border: none;
      background: none;
      cursor: pointer;
    }

    .side-menu {
      position: fixed;
      top: 0;
      right: -260px;
      width: 240px;
      height: 100%;
      background: #222;
      color: white;
      padding: 20px;
      transition: 0.3s;
    }

    .side-menu button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
    }

    .container {
      padding: 20px;
      text-align: center;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 15px;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 10px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 15px;
    }

    th, td {
      border: 1px solid #ccc;
      padding: 10px;
      text-align: center;
    }

    th {
      background: #333;
      color: white;
    }

    .search-box input, .search-box button {
      padding: 8px;
      margin: 5px;
    }
  </style>
</head>

<body>

<div class="topbar">
  <h3>Smart Room</h3>
  <button class="menu-btn" onclick="toggleMenu()">☰</button>
</div>

<div id="menu" class="side-menu">
  <h3>Menu</h3>
  <button onclick="showLive()">Live</button>
  <button onclick="showTemp()">Temp History</button>
  <button onclick="showHum()">Humidity History</button>
  <button onclick="toggleDark()">Dark Mode</button>
</div>

<div class="container">

  <!-- LIVE -->
  <div id="live">
    <h2>Live Data</h2>

    <div class="grid">
      <div class="card">
        <h3>Temp</h3>
        <div id="temp">--</div>
      </div>

      <div class="card">
        <h3>Humidity</h3>
        <div id="hum">--</div>
      </div>

      <div class="card">
        <h3>Status</h3>
        <div id="status">--</div>
      </div>
    </div>

    <div id="alert">System Normal</div>
  </div>

  <!-- HISTORY -->
  <div id="history" style="display:none;">
    <h2 id="title">History</h2>

    <div class="search-box">
      <input type="date" id="searchDate">
      <input type="time" id="searchTime">
      <button onclick="filterHistory()">Search</button>
      <button onclick="resetHistory()">Reset</button>
    </div>

    <div id="list"></div>
  </div>

</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<script src="script.js"></script>

</body>
</html>
